{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — APM TOPNET</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-brand">APM</span><span class="login-brand-accent">TOPNET</span>
    </div>
    <h1>Plateforme APM</h1>
    <div class="subtitle">Gestion du Patrimoine Applicatif — DSI TOPNET</div>

    {% if form.errors %}
      <div class="msg error">Identifiants invalides ou compte désactivé.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input class="form-control" type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary">Se connecter</button>
    </form>
    <div style="text-align:center; margin-top:14px;">
      <a href="{% url 'password_reset_request' %}" class="link-back">Mot de passe oublié ?</a>
    </div>
  </div>
</body>
</html>
