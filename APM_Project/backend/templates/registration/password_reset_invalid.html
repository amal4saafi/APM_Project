{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lien invalide — APM TOPNET</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-brand">APM</span><span class="login-brand-accent">TOPNET</span>
    </div>
    <div class="reset-icon" style="color:var(--danger);">⛔</div>
    <h1>Lien invalide</h1>
    <div class="subtitle" style="color:var(--danger);">{{ raison }}</div>
    <p style="margin-top:14px; font-size:13.5px; color:var(--muted); text-align:center;">
      Ce lien a peut-être déjà été utilisé ou a expiré (validité : 24h).
    </p>
    <div style="text-align:center; margin-top:20px; display:flex; flex-direction:column; gap:10px;">
      <a href="{% url 'password_reset_request' %}" class="btn btn-primary">Demander un nouveau lien</a>
      <a href="{% url 'login' %}" class="link-back">← Retour à la connexion</a>
    </div>
  </div>
</body>
</html>
