{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe modifié — APM TOPNET</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-brand">APM</span><span class="login-brand-accent">TOPNET</span>
    </div>
    <div class="reset-icon" style="color:var(--success);">✅</div>
    <h1>Mot de passe modifié !</h1>
    <div class="subtitle" style="color:var(--success);">
      Votre mot de passe a été réinitialisé avec succès.
    </div>
    <p style="font-size:13.5px; color:var(--muted); text-align:center; margin-top:10px;">
      Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
    </p>
    <div style="text-align:center; margin-top:24px;">
      <a href="{% url 'login' %}" class="btn btn-primary" style="padding:12px 32px;">Se connecter</a>
    </div>
  </div>
</body>
</html>
